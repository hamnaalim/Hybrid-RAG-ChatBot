services:
  api:
    build: .
    command: ["api"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - hf_cache:/app/.cache/huggingface
    restart: unless-stopped

  ui:
    build: .
    command: ["ui"]
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hf_cache:
